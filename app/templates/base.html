<!-- app/templates/base.html — base layout -->
<!DOCTYPE html>
<html lang='en'>
<head>
  <link href='https://cdn.jsdelivr.net/npm/bootstrap@5.3/dist/css/bootstrap.min.css' rel='stylesheet'>
  <title>UAR Platform</title>
</head>
<body>
  <nav class='navbar navbar-dark' style='background:#1A1A1A'>
    <span class='navbar-brand ms-3'>UAR Automation Platform</span>
    {% if current_user.is_authenticated %}
    <span class='text-light me-3'>{{ current_user.role|upper }} — {{ current_user.username }}</span>
    <a href='/logout' class='btn btn-outline-light btn-sm me-3'>Logout</a>
    {% endif %}
  </nav>
  <div class='container mt-4'>{% block content %}{% endblock %}</div>
</body>
</html>
