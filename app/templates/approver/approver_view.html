<!-- app/templates/approver/approver_view.html -->
{% extends 'base.html' %}
{% block content %}

<h4>Review — Approver View (Read Only)</h4>

<table class='table table-bordered'>
  <thead class='table-dark'>
    <tr>
      <th>Account</th>
      <th>Decision</th>
      <th>Comment</th>
    </tr>
  </thead>
  <tbody>
    {% for entry in entries %}
    <tr>
      <td>{{ entry.account_name }}</td>
      <td>{{ entry.decision }}</td>
      <td>{{ entry.comment }}</td>
    </tr>
    {% endfor %}
  </tbody>
</table>

<div class='mt-4'>
  <form method='POST' action='/reviews/{{ review.id }}/approve' class='d-inline'>
    <button class='btn btn-dark'>Approve</button>
  </form>

  <form method='POST' action='/reviews/{{ review.id }}/reject' class='mt-3'>
    <div class='mb-3'>
      <label class='form-label'>Rejection reason (required)</label>
      <textarea name='reason' class='form-control' rows='3'
        required placeholder='Mandatory rejection reason'></textarea>
    </div>
    <button class='btn btn-outline-dark'>Reject</button>
  </form>
</div>

{% endblock %}
